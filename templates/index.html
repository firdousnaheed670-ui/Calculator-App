<!DOCTYPE html>
<html lang="en">
<head>
    <title>Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow" style="width: 350px;">
        <h3 class="text-center mb-3">Calculator</h3>

        <form method="POST">
            <input type="number" step="any" name="num1" class="form-control mb-2" placeholder="First number" required>
            <input type="number" step="any" name="num2" class="form-control mb-3" placeholder="Second number" required>

            <select name="operation" class="form-select mb-3">
                <option value="add">Add</option>
                <option value="subtract">Subtract</option>
                <option value="multiply">Multiply</option>
                <option value="divide">Divide</option>
            </select>

            <button type="submit" class="btn btn-primary w-100">Calculate</button>
        </form>

        {% if result is not none %}
        <div class="alert alert-success mt-3 text-center">
            Result: {{ result }}
        </div>
        {% endif %}
    </div>
</div>

</body>
</html>
